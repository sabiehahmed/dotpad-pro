name: Dotpad
options:
  bundleIdPrefix: com.dotpad
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
targets:
  Dotpad:
    type: application
    platform: macOS
    sources:
      - path: Dotpad
    info:
      path: Dotpad/Resources/Info.plist
      properties:
        CFBundleDisplayName: Dotpad
        CFBundleName: Dotpad
        LSUIElement: true
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dotpad.Dotpad
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  DotpadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DotpadTests
    dependencies:
      - target: Dotpad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dotpad.DotpadTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Dotpad:
    build:
      targets:
        Dotpad: all
        DotpadTests: [test]
    test:
      targets:
        - DotpadTests
